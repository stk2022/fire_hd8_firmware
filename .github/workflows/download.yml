name: Download and Split Kindle Firmware

on:
  workflow_dispatch:

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download firmware
        run: |
          curl -L -o kindle_voyage_5.13.6.bin \
            "https://fireos-tablet-src.s3.us-west-2.amazonaws.com/3omHNOvwW4KDYd5xDz75MnJ9npabcc/update-kindle-Fire_HD8_10th_Gen-PS7331_user_4463_0031575863172.bin"
          ls -lh kindle_voyage_5.13.6.bin

      - name: Split into parts
        run: |
          mkdir -p firmware
          split -b 90m kindle_voyage_5.13.6.bin firmware/firmware.part
          ls -lh firmware/

      - name: Commit and push parts
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add firmware/
          git commit -m "Add Kindle 5.19.2 firmware parts"
          git push
